
    <!DOCTYPE html>
    <html>
    <head>
        <title>Mapa de búsqueda</title>
        <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAUbNrDCnRiCqyIJ1lbe7l_8sryb2V3WUo"></script>
    </head>
    <body>
    <div id="map" style="height:100vh;"></div>

    <script>
    function initMap() {
        var map = new google.maps.Map(document.getElementById('map'), {
            zoom: 14,
            center: {lat: 24.8090649, lng: -107.3940117}
        });

        var pasos = [];
            pasos.push([{lat:24.8058832, lng:-107.3978145}]);
        pasos.push([{lat:24.8058832, lng:-107.3978145},{lat:24.8090649, lng:-107.3940117}]);
        pasos.push([{lat:24.8058832, lng:-107.3978145},{lat:24.8137788, lng:-107.3982352}]);
        pasos.push([{lat:24.8058832, lng:-107.3978145},{lat:24.8047683, lng:-107.3972418}]);

        var i = 0;
        function dibujarPaso() {
            if (i < pasos.length) {
                new google.maps.Polyline({
                    path: pasos[i],
                    geodesic: true,
                    strokeColor: "#AAAAAA",
                    strokeOpacity: 0.5,
                    strokeWeight: 2,
                    map: map
                });
                i++;
                setTimeout(dibujarPaso, 500); // medio segundo entre pasos
            } else {
    
                new google.maps.Polyline({
                    path: [{lat:24.8058832, lng:-107.3978145},{lat:24.8047683, lng:-107.3972418}],
                    geodesic: true,
                    strokeColor: "#FF0000",
                    strokeOpacity: 1.0,
                    strokeWeight: 4,
                    map: map
                });
        
            }
        }
        dibujarPaso();
    }
    window.onload = initMap;
    </script>
    </body>
    </html>
